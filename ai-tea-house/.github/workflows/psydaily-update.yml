name: PsyDaily Auto Update

on:
  # 每次 push 时触发（测试用）
  push:
    branches: [ master, main ]
  
  schedule:
    # 每天北京时间 7:00 运行 (UTC 23:00)
    - cron: '0 23 * * *'
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  update-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser
        
    - name: Fetch RSS papers
      run: |
        cd psydaily
        python rss_fetcher.py
        
    - name: Generate static site
      run: |
        cd psydaily
        python static_site_generator.py
        
    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add psydaily/data/ psydaily/site/
        git commit -m "📚 Auto update: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
        git push
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./psydaily/site
        
    - name: Telegram notification
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_USER_ID }}" \
          -d "text=📚 PsyDaily 已更新！\\n\\n今日新论文已抓取并推送。\\n\\n查看网页版：\\nhttps://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
